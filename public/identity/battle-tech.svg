<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
<defs>
  <radialGradient id="bg" cx="50%" cy="40%" r="80%">
    <stop offset="0%" stop-color="#1d2c47"/><stop offset="48%" stop-color="#0b1120"/><stop offset="100%" stop-color="#04060b"/>
  </radialGradient>
  <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#7fd0ff"/><stop offset="55%" stop-color="#3aa0ff"/><stop offset="100%" stop-color="#1146cf"/></linearGradient>
  <linearGradient id="redGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#ff9b8f"/><stop offset="55%" stop-color="#ff4f44"/><stop offset="100%" stop-color="#c8121f"/></linearGradient>
  <radialGradient id="blueBlob" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#39a8ff" stop-opacity=".85"/><stop offset="100%" stop-color="#39a8ff" stop-opacity="0"/></radialGradient>
  <radialGradient id="redBlob" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#ff4a3d" stop-opacity=".85"/><stop offset="100%" stop-color="#ff4a3d" stop-opacity="0"/></radialGradient>
  <filter id="nB" x="-70%" y="-70%" width="240%" height="240%"><feGaussianBlur in="SourceGraphic" stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="nR" x="-70%" y="-70%" width="240%" height="240%"><feGaussianBlur in="SourceGraphic" stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="soft" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="70"/></filter>
  <filter id="statusGlow" x="-80%" y="-120%" width="260%" height="340%"><feGaussianBlur stdDeviation="6"/></filter>
</defs>

<rect width="1200" height="630" fill="url(#bg)"/>
<g opacity="0.06" fill="#cfe4ff"><polygon points="360,-40 520,-40 430,680 150,680"/><polygon points="840,-40 680,-40 770,680 1050,680"/></g>

<!-- (A) CONFLICT LAYER: blue field left, red field right, symmetric -->
<ellipse cx="300" cy="320" rx="360" ry="360" fill="url(#blueBlob)" filter="url(#soft)"/>
<ellipse cx="900" cy="320" rx="360" ry="360" fill="url(#redBlob)" filter="url(#soft)"/>

<!-- (B) LIVE STATUS LAYER -->
<g transform="translate(600 78)">
  <rect x="-170" y="-30" width="340" height="58" rx="29" fill="#0c1120" stroke="#F5C542" stroke-width="2" opacity="0.95"/>
  <circle cx="-128" cy="0" r="8" fill="#F5C542" filter="url(#statusGlow)"/>
  <text x="14" y="11" text-anchor="middle" font-family="'Arial Black','Arial',sans-serif" font-weight="900" font-size="28" letter-spacing="3" fill="#F5C542">WEEK 7 · LIVE</text>
</g>

<!-- side labels (uppercase, equal weight) + central VS core -->
<text x="300" y="332" text-anchor="middle" font-family="'Arial Black','Arial',sans-serif" font-weight="900" font-size="80" letter-spacing="-1" fill="url(#blueGrad)" filter="url(#nB)">IPHONE</text>
<text x="900" y="332" text-anchor="middle" font-family="'Arial Black','Arial',sans-serif" font-weight="900" font-size="66" letter-spacing="-1" fill="url(#redGrad)" filter="url(#nR)">ANDROID</text>

<g font-family="'Arial Black','Arial',sans-serif" font-weight="900" font-size="150" text-anchor="middle" letter-spacing="-6" transform="translate(0 12)">
  <text x="558" y="350" transform="skewX(-7)" fill="url(#blueGrad)" filter="url(#nB)">V</text>
  <text x="650" y="350" transform="skewX(-7)" fill="url(#redGrad)" filter="url(#nR)">S</text>
  <text x="558" y="350" transform="skewX(-7)" fill="url(#blueGrad)">V</text>
  <text x="650" y="350" transform="skewX(-7)" fill="url(#redGrad)">S</text>
</g>

<!-- (C) TIME LAYER: countdown with urgency glow -->
<g transform="translate(600 432)">
  <text x="0" y="-14" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="16" letter-spacing="4" fill="#9A9AB0">TIME REMAINING</text>
  <text x="0" y="30" text-anchor="middle" font-family="'Courier New',monospace" font-weight="900" font-size="50" letter-spacing="2" fill="#F5C542" filter="url(#statusGlow)">5d 02h 40m</text>
  <text x="0" y="30" text-anchor="middle" font-family="'Courier New',monospace" font-weight="900" font-size="50" letter-spacing="2" fill="#ffffff">5d 02h 40m</text>
</g>

<!-- (D) SCORE LAYER: symmetric, closeness emphasis when <5% -->
<text x="80" y="540" font-family="'Arial Black',Arial,sans-serif" font-weight="900" font-size="34" fill="#3aa0ff">61%</text>
<text x="1120" y="540" text-anchor="end" font-family="'Arial Black',Arial,sans-serif" font-weight="900" font-size="34" fill="#ff4f44">39%</text>

<rect x="80" y="556" width="1040" height="20" rx="10" fill="#1F1F2C"/>
<rect x="80" y="556" width="634.4" height="20" rx="10" fill="url(#blueGrad)"/>
<rect x="714.4" y="556" width="405.6" height="20" rx="10" fill="url(#redGrad)"/>
<rect x="712.4" y="550" width="4" height="32" rx="2" fill="#ffffff"/>
</svg>